name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: todo_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d todo_db_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore solution
        run: dotnet restore TodoApp.sln

      - name: Build solution
        run: dotnet build TodoApp.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ./tests/TodoApp.UnitTests/TodoApp.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx"

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=todo_db_test;Username=postgres;Password=postgres
          ASPNETCORE_ENVIRONMENT: Testing
        run: dotnet test ./tests/TodoApp.IntegrationTests/TodoApp.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
